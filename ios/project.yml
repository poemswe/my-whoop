name: OpenWhoop
options:
  bundleIdPrefix: com.poemswe
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
packages:
  WhoopProtocol:
    path: ../Packages/WhoopProtocol
  WhoopStore:
    path: ../Packages/WhoopStore
targets:
  OpenWhoop:
    type: application
    platform: iOS
    sources: [OpenWhoop]
    configFiles:
      Debug: OpenWhoop/Config/Secrets.xcconfig
      Release: OpenWhoop/Config/Secrets.xcconfig
    info:
      path: OpenWhoop/Info.plist
      properties:
        CFBundleDisplayName: OpenWhoop
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSBluetoothAlwaysUsageDescription: >-
          OpenWhoop connects to your WHOOP 4.0 over Bluetooth to read heart rate,
          R-R intervals, battery, and sensor data locally on your device.
        NSHealthShareUsageDescription: >-
          OpenWhoop reads your sleep data to display it in Apple Health.
        NSHealthUpdateUsageDescription: >-
          OpenWhoop writes your WHOOP sleep sessions and heart rate data to Apple Health.
        NSLocalNetworkUsageDescription: >-
          OpenWhoop uploads your captured WHOOP data to your own self-hosted
          server on your local network for analysis.
        UIBackgroundModes:
          - bluetooth-central
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - com.poemswe.mywhoop.refresh
        WHOOP_BASE_URL: $(WHOOP_BASE_URL)
        WHOOP_API_KEY: $(WHOOP_API_KEY)
        WHOOP_DEVICE_ID: $(WHOOP_DEVICE_ID)
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            100.79.107.77:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: false
    dependencies:
      - package: WhoopProtocol
      - package: WhoopStore
      - sdk: HealthKit.framework
    entitlements:
      path: OpenWhoop/OpenWhoop.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.poemswe.mywhoop
        TARGETED_DEVICE_FAMILY: 1
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  OpenWhoopTests:
    type: bundle.unit-test
    platform: iOS
    sources: [OpenWhoopTests]
    dependencies:
      - target: OpenWhoop
      - package: WhoopProtocol
      - package: WhoopStore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
